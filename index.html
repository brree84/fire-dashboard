<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Fire Alarm IoT - MQTT Live Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 12px 36px rgba(0, 0, 0, 0.10);
            --radius: 18px;
            --radius-sm: 10px;
            --green: #10b981;
            --yellow: #f59e0b;
            --red: #ef4444;
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Consolas', monospace;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            transition: all 0.3s;
        }
        body.dark {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: #334155;
        }
        .main-container {
            max-width: 1340px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 14px;
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px 22px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .top-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .app-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            flex-shrink: 0;
            transition: all 0.4s;
        }
        .icon-aman {
            background: linear-gradient(135deg, #10b981, #34d399);
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.3);
        }
        .icon-warning {
            background: linear-gradient(135deg, #f59e0b, #f97316);
            box-shadow: 0 6px 18px rgba(245, 158, 11, 0.4);
        }
        .icon-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.5);
            animation: iconPulse 0.8s infinite;
        }
        @keyframes iconPulse {
            0%, 100% { box-shadow: 0 6px 20px rgba(239, 68, 68, 0.5); }
            50% { box-shadow: 0 10px 34px rgba(239, 68, 68, 0.8); }
        }
        .status-badge {
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        .badge-aman {
            background: rgba(16, 185, 129, 0.08);
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.25);
        }
        .badge-warning {
            background: rgba(245, 158, 11, 0.08);
            color: #f59e0b;
            border-color: rgba(245, 158, 11, 0.35);
        }
        .badge-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.5);
            animation: badgePulse 1s infinite;
        }
        @keyframes badgePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
            50% { box-shadow: 0 0 0 16px rgba(239, 68, 68, 0); }
        }
        .conn-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.78rem;
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 20px;
            background: var(--card);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .conn-indicator:hover {
            border-color: #6366f1;
        }
        .conn-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #94a3b8;
            transition: all 0.3s;
        }
        .conn-dot.connected {
            background: #10b981;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
            animation: connPulse 2s infinite;
        }
        @keyframes connPulse {
            0%, 100% { box-shadow: 0 0 8px rgba(16, 185, 129, 0.5); }
            50% { box-shadow: 0 0 18px rgba(16, 185, 129, 0.9); }
        }
        .danger-score-wrap {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px 22px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .score-circle {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            border: 5px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 1.4rem;
            font-weight: 700;
            transition: all 0.5s;
        }
        .score-low {
            border-color: #10b981;
            color: #10b981;
        }
        .score-mid {
            border-color: #f59e0b;
            color: #f59e0b;
        }
        .score-high {
            border-color: #ef4444;
            color: #ef4444;
            animation: scoreGlow 1s infinite;
        }
        @keyframes scoreGlow {
            0%, 100% { box-shadow: 0 0 12px rgba(239, 68, 68, 0.3); }
            50% { box-shadow: 0 0 28px rgba(239, 68, 68, 0.7); }
        }
        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
            gap: 16px;
        }
        .sensor-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .sensor-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .sensor-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .sensor-icon-sm {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 15px;
        }
        .sensor-value {
            font-family: var(--font-mono);
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
        }
        .sensor-value.crit {
            color: #ef4444;
        }
        .sparkline-wrap {
            height: 40px;
            margin: 6px 0;
        }
        .threshold-bar {
            height: 5px;
            background: #e2e8f0;
            border-radius: 10px;
            margin-top: 6px;
            overflow: hidden;
        }
        body.dark .threshold-bar {
            background: #334155;
        }
        .threshold-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s;
        }
        .output-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }
        .output-card {
            background: var(--card);
            border-radius: var(--radius-sm);
            padding: 16px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .led-triple {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .led-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #64748b;
            transition: all 0.2s;
        }
        .led-dot.on-green {
            background: #10b981;
            box-shadow: 0 0 12px #10b981;
        }
        .led-dot.on-yellow {
            background: #f59e0b;
            box-shadow: 0 0 12px #f59e0b;
        }
        .led-dot.on-red {
            background: #ef4444;
            box-shadow: 0 0 14px #ef4444;
            animation: blinkRed 0.4s infinite;
        }
        @keyframes blinkRed {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.15; }
        }
        .btn {
            padding: 9px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.78rem;
            border: none;
            cursor: pointer;
            border: 2px solid var(--border);
            background: var(--card);
            color: var(--text);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            font-family: var(--font-sans);
        }
        .btn:hover {
            border-color: #6366f1;
            color: #6366f1;
        }
        .btn.active-btn {
            background: #6366f1;
            color: #fff;
            border-color: #6366f1;
        }
        .btn-danger {
            background: #ef4444;
            color: #fff;
            border-color: #ef4444;
        }
        .btn-danger:hover {
            background: #dc2626;
            border-color: #dc2626;
        }
        .btn-sm {
            padding: 5px 12px;
            font-size: 0.7rem;
        }
        .log-section {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }
        .log-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.74rem;
        }
        .log-table th {
            text-align: left;
            padding: 10px 8px;
            background: #f1f5f9;
            color: #475569;
            font-weight: 600;
            font-size: 0.68rem;
            text-transform: uppercase;
        }
        body.dark .log-table th {
            background: #1e293b;
        }
        .log-table td {
            padding: 8px;
            border-bottom: 1px solid var(--border);
        }
        .log-container {
            max-height: 300px;
            overflow-y: auto;
        }
        .fire-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            pointer-events: none;
            background: radial-gradient(ellipse at bottom, rgba(255, 70, 10, 0.22) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.6s;
            z-index: 50;
        }
        .fire-overlay.active {
            opacity: 1;
            animation: flameFlicker 0.3s infinite alternate;
        }
        @keyframes flameFlicker {
            0% { transform: scaleY(1); opacity: 0.7; }
            100% { transform: scaleY(1.04); opacity: 1; }
        }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: #fff;
            padding: 10px 22px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.82rem;
            z-index: 999;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px;
            max-width: 440px;
            width: 92%;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
        }
        .modal-box h3 {
            margin: 0 0 14px;
        }
        .modal-box label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            margin-top: 8px;
            color: var(--text);
        }
        .modal-box input {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-family: var(--font-sans);
            font-size: 0.85rem;
            background: var(--bg);
            color: var(--text);
        }
        .modal-box input:focus {
            border-color: #6366f1;
            outline: none;
        }
        @media (max-width: 768px) {
            .sensor-value {
                font-size: 1.9rem;
            }
            .top-bar {
                flex-direction: column;
                text-align: center;
            }
            .top-left {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="fire-overlay" id="fireOverlay"></div>
    <div class="toast" id="toast"></div>

    <div class="main-container">
        <div class="top-bar">
            <div class="top-left">
                <div class="app-icon icon-aman" id="appIcon"><i class="fas fa-shield-halved"></i></div>
                <div>
                    <h2 style="font-weight:700; margin:0;">🔥 Fire Alarm IoT</h2>
                    <span style="font-size:0.78rem; color:var(--text-secondary);">MQTT · 7-Mode Priority · Real-time</span>
                </div>
            </div>
            <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                <div class="conn-indicator" id="mqttStatusBtn" title="Status MQTT">
                    <span class="conn-dot" id="connDot"></span>
                    <span id="connLabel">MQTT: Menghubung...</span>
                </div>
                <div class="status-badge badge-aman" id="statusBadge">✅ SISTEM AMAN</div>
                <div class="conn-indicator" id="darkToggle" title="Dark Mode">
                    <i class="fas fa-moon"></i>
                </div>
            </div>
        </div>

        <div class="danger-score-wrap">
            <div class="score-circle score-low" id="scoreCircle">0%</div>
            <div>
                <h3 style="margin:0;">Skor Risiko Kebakaran</h3>
                <p style="color:var(--text-secondary); margin:4px 0 0;" id="scoreDesc">Menunggu data MQTT...</p>
            </div>
            <div style="margin-left:auto; text-align:right; color:var(--text-secondary); font-size:0.85rem;">
                <span id="triggerText">0/4 sensor terpicu</span>
            </div>
        </div>

        <div class="sensor-grid" id="sensorGrid"></div>
        <div class="output-grid" id="outputGrid"></div>

        <div style="display:flex; flex-wrap:wrap; gap:8px; margin:8px 0 16px;">
            <button class="btn" data-sim="normal"><i class="fas fa-check-circle"></i> Normal</button>
            <button class="btn" data-sim="warning"><i class="fas fa-exclamation-triangle"></i> Waspada</button>
            <button class="btn" data-sim="smoke"><i class="fas fa-smog"></i> Asap</button>
            <button class="btn" data-sim="fireOnly"><i class="fas fa-fire"></i> Api</button>
            <button class="btn" data-sim="hotRoom"><i class="fas fa-temperature-high"></i> Panas</button>
            <button class="btn" data-sim="dryRoom"><i class="fas fa-droplet-slash"></i> Kering</button>
            <button class="btn btn-danger" data-sim="emergency"><i class="fas fa-skull"></i> DARURAT</button>
            <button class="btn" id="btnThreshold"><i class="fas fa-sliders"></i> Threshold</button>
            <button class="btn btn-sm" id="btnClearLog" style="margin-left:auto;"><i class="fas fa-trash"></i> Hapus Log</button>
        </div>

        <div class="log-section">
            <div class="log-header">
                <h3 style="margin:0;"><i class="fas fa-history"></i> Riwayat Kejadian</h3>
                <div style="display:flex; gap:6px;">
                    <button class="btn btn-sm log-filter active-btn" data-filter="all">Semua</button>
                    <button class="btn btn-sm log-filter" data-filter="status">Status</button>
                    <button class="btn btn-sm log-filter" data-filter="sensor">Sensor</button>
                </div>
            </div>
            <div class="log-container">
                <table class="log-table">
                    <thead><tr><th>Waktu</th><th>Event</th><th>Status</th><th>MQ2</th><th>Api</th><th>Room</th><th>Hum</th></tr></thead>
                    <tbody id="logBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="thresholdModal">
        <div class="modal-box">
            <h3>⚙️ Atur Threshold Sensor</h3>
            <label>MQ2 Gas (analog) <input id="thGas" type="number" value="2000"></label>
            <label>Suhu Api Bahaya (°C) <input id="thFireDanger" type="number" value="70" step="0.5"></label>
            <label>Suhu Api Waspada (°C) <input id="thFireWarn" type="number" value="50" step="0.5"></label>
            <label>Suhu Ruangan Panas (°C) <input id="thRoomHot" type="number" value="40" step="0.5"></label>
            <label>Kelembaban Kering (%) <input id="thHumDry" type="number" value="50"></label>
            <div style="text-align:right; margin-top:14px;">
                <button class="btn" onclick="closeThresholdModal()">Batal</button>
                <button class="btn active-btn" id="saveThreshold">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============= STATE =============
            const state = {
                gasValue: 0,
                objectTemp: 0,
                roomTemp: 0,
                humidity: 0,
                status: 'AMAN',      // Sesuai kode Arduino: BAHAYA, WASPADA, GAS_TERDETEKSI, API_TERDETEKSI, RUANGAN_PANAS, RUANGAN_KERING, AMAN
                ledGreen: false,
                ledYellow: false,
                ledRed: false,
                relay: false,
                buzzer: false,
                thresholds: {
                    gas: 2000,
                    fireDanger: 70,
                    fireWarn: 50,
                    roomHot: 40,
                    humDry: 50,
                },
                logs: [],
                history: {
                    gas: Array(20).fill(0),
                    objTemp: Array(20).fill(0),
                    roomTemp: Array(20).fill(0),
                    hum: Array(20).fill(0),
                },
                simulationActive: false,
                mqttConnected: false
            };

            // ============= DOM =============
            const $ = (s) => document.querySelector(s);
            const $$ = (s) => document.querySelectorAll(s);

            // ============= UI BUILD =============
            function buildSensorCards() {
                const grid = $('#sensorGrid');
                const sensors = [
                    { id: 'gas', label: 'MQ2 - Sensor Gas', unit: 'analog', icon: 'fa-wind', color: '#8b5cf6' },
                    { id: 'objTemp', label: 'MLX90614 - Suhu Api', unit: '°C', icon: 'fa-fire', color: '#ef4444' },
                    { id: 'roomTemp', label: 'DHT22 - Suhu Ruangan', unit: '°C', icon: 'fa-temperature-high', color: '#3b82f6' },
                    { id: 'hum', label: 'DHT22 - Kelembaban', unit: '%', icon: 'fa-droplet', color: '#10b981' },
                ];
                grid.innerHTML = sensors.map(s => `
                <div class="sensor-card">
                  <div class="sensor-header">
                    <div class="sensor-icon-sm" style="background:${s.color};"><i class="fas ${s.icon}"></i></div>
                    <span style="font-size:0.7rem;color:var(--text-secondary);">${s.label}</span>
                  </div>
                  <div class="sensor-value" id="val-${s.id}">0</div>
                  <span style="font-size:0.75rem;color:var(--text-secondary);">${s.unit}</span>
                  <div class="sparkline-wrap"><canvas id="spark-${s.id}"></canvas></div>
                  <div class="threshold-bar">
                    <div class="threshold-fill" id="fill-${s.id}" style="width:0%;background:${s.color};"></div>
                  </div>
                </div>
              `).join('');
            }

            function buildOutputCards() {
                $('#outputGrid').innerHTML = `
                <div class="output-card">
                  <p style="font-size:0.7rem;color:var(--text-secondary);">LED Indikator</p>
                  <div class="led-triple">
                    <span class="led-dot" id="ledGreen"></span>
                    <span class="led-dot" id="ledYellow"></span>
                    <span class="led-dot" id="ledRed"></span>
                  </div>
                  <small id="ledLabel" style="color:var(--text-secondary);">Hijau (Aman)</small>
                </div>
                <div class="output-card">
                  <p style="font-size:0.7rem;color:var(--text-secondary);">Relay Alarm</p>
                  <div style="font-size:1.8rem;" id="relayIcon">🔌</div>
                  <small id="relayLabel" style="color:var(--text-secondary);">OFF</small>
                </div>
                <div class="output-card">
                  <p style="font-size:0.7rem;color:var(--text-secondary);">Buzzer</p>
                  <div style="font-size:1.8rem;" id="buzzerIcon">🔇</div>
                  <small id="buzzerLabel" style="color:var(--text-secondary);">Tidak berbunyi</small>
                </div>
                <div class="output-card">
                  <p style="font-size:0.7rem;color:var(--text-secondary);">MQTT Broker</p>
                  <div style="font-size:1.8rem;" id="mqttIcon">🟠</div>
                  <small id="mqttLabel">Menunggu data</small>
                </div>
              `;
            }

            // Sparkline charts
            const charts = {};
            function initSparklines() {
                const configs = [
                    { id: 'gas', color: '#8b5cf6' }, { id: 'objTemp', color: '#ef4444' },
                    { id: 'roomTemp', color: '#3b82f6' }, { id: 'hum', color: '#10b981' }
                ];
                configs.forEach(c => {
                    const ctx = document.getElementById('spark-' + c.id);
                    if (!ctx) return;
                    charts[c.id] = new Chart(ctx, {
                        type: 'line',
                        data: { labels: Array(20).fill(''), datasets: [{ data: Array(20).fill(0), borderColor: c.color, backgroundColor: c.color + '18', borderWidth: 1.8, fill: true, pointRadius: 0, tension: 0.3 }] },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { enabled: false } }, scales: { x: { display: false }, y: { display: false } } }
                    });
                });
            }
            function updateSparklines() {
                ['gas', 'objTemp', 'roomTemp', 'hum'].forEach(k => {
                    if (charts[k]) {
                        charts[k].data.datasets[0].data = state.history[k];
                        charts[k].update();
                    }
                });
            }
            function pushHistory() {
                state.history.gas.push(state.gasValue);
                state.history.objTemp.push(state.objectTemp);
                state.history.roomTemp.push(state.roomTemp);
                state.history.hum.push(state.humidity);
                ['gas','objTemp','roomTemp','hum'].forEach(k => { if (state.history[k].length > 20) state.history[k] = state.history[k].slice(-20); });
                updateSparklines();
            }

            // ============= LOGIKA STATUS (sesuai Arduino) =============
            function analyzeStatusFromArduino() {
                // Fungsi ini sebenarnya tidak dipakai karena status sudah dikirim langsung dari Arduino.
                // Tapi kita simpan untuk fallback jika hanya nilai sensor yang diterima.
                const g = state.gasValue, ot = state.objectTemp, rt = state.roomTemp, h = state.humidity, th = state.thresholds;
                if (ot >= th.fireDanger && g >= th.gas && rt >= 35) return 'BAHAYA';
                if (g >= th.gas && ot >= th.fireWarn) return 'WASPADA';
                if (g >= th.gas && ot < th.fireWarn) return 'GAS_TERDETEKSI';
                if (ot >= th.fireWarn && g < th.gas) return 'API_TERDETEKSI';
                if (rt > th.roomHot) return 'RUANGAN_PANAS';
                if (h < th.humDry) return 'RUANGAN_KERING';
                return 'AMAN';
            }

            function applyOutputsByStatus(status) {
                // Atur LED, relay, buzzer berdasarkan status (sama seperti logika di Arduino)
                state.ledGreen = false; state.ledYellow = false; state.ledRed = false;
                state.relay = false; state.buzzer = false;
                if (status === 'BAHAYA') {
                    state.ledRed = true;
                    state.relay = true;
                    state.buzzer = true;
                } else if (['WASPADA', 'GAS_TERDETEKSI', 'API_TERDETEKSI', 'RUANGAN_PANAS'].includes(status)) {
                    state.ledYellow = true;
                    state.buzzer = true;
                } else if (status === 'RUANGAN_KERING') {
                    // semua mati
                } else {
                    state.ledGreen = true;
                }
            }

            // ============= UPDATE UI =============
            function updateUI() {
                // Perbarui nilai sensor
                $('#val-gas').textContent = state.gasValue;
                $('#val-objTemp').textContent = state.objectTemp.toFixed(1);
                $('#val-roomTemp').textContent = state.roomTemp.toFixed(1);
                $('#val-hum').textContent = state.humidity.toFixed(1);
                // Batas kritis
                const gasEl = $('#val-gas'), objEl = $('#val-objTemp'), roomEl = $('#val-roomTemp'), humEl = $('#val-hum');
                [gasEl, objEl, roomEl, humEl].forEach(el => el.classList.remove('crit'));
                if (state.gasValue >= state.thresholds.gas) gasEl.classList.add('crit');
                if (state.objectTemp >= state.thresholds.fireWarn) objEl.classList.add('crit');
                if (state.roomTemp > state.thresholds.roomHot) roomEl.classList.add('crit');
                if (state.humidity < state.thresholds.humDry) humEl.classList.add('crit');
                // Progress bar
                const maxVals = { gas: 4095, objTemp: 100, roomTemp: 60, hum: 100 };
                ['gas','objTemp','roomTemp','hum'].forEach(k => {
                    const val = state[k === 'gas' ? 'gasValue' : k === 'objTemp' ? 'objectTemp' : k === 'roomTemp' ? 'roomTemp' : 'humidity'];
                    const fill = $('#fill-'+k);
                    if (fill) fill.style.width = Math.min((val / maxVals[k]) * 100, 100) + '%';
                });
                // LED
                $('#ledGreen').className = 'led-dot' + (state.ledGreen ? ' on-green' : '');
                $('#ledYellow').className = 'led-dot' + (state.ledYellow ? ' on-yellow' : '');
                $('#ledRed').className = 'led-dot' + (state.ledRed ? ' on-red' : '');
                $('#ledLabel').textContent = state.ledGreen ? 'Hijau (Aman)' : state.ledYellow ? 'Kuning (Waspada)' : state.ledRed ? 'Merah (Bahaya)' : 'Semua Mati';
                $('#relayIcon').textContent = state.relay ? '⚡' : '🔌';
                $('#relayLabel').textContent = state.relay ? 'ON (Aktif)' : 'OFF';
                $('#buzzerIcon').textContent = state.buzzer ? '🔊' : '🔇';
                $('#buzzerLabel').textContent = state.buzzer ? 'Berbunyi!' : 'Diam';

                // Status badge & icon
                const badge = $('#statusBadge'), icon = $('#appIcon');
                badge.classList.remove('badge-aman','badge-warning','badge-danger');
                icon.classList.remove('icon-aman','icon-warning','icon-danger');
                $('#fireOverlay').classList.remove('active');
                let displayText = '';
                if (state.status === 'BAHAYA') {
                    badge.classList.add('badge-danger'); icon.classList.add('icon-danger');
                    icon.querySelector('i').className = 'fas fa-skull';
                    displayText = '🚨 BAHAYA! KEBAKARAN!';
                    $('#fireOverlay').classList.add('active');
                } else if (['WASPADA','GAS_TERDETEKSI','API_TERDETEKSI','RUANGAN_PANAS'].includes(state.status)) {
                    badge.classList.add('badge-warning'); icon.classList.add('icon-warning');
                    icon.querySelector('i').className = 'fas fa-exclamation-triangle';
                    displayText = `⚠️ ${state.status.replace(/_/g, ' ')}`;
                } else if (state.status === 'RUANGAN_KERING') {
                    badge.classList.add('badge-warning'); icon.classList.add('icon-warning');
                    icon.querySelector('i').className = 'fas fa-droplet-slash';
                    displayText = '💧 RUANGAN KERING';
                } else {
                    badge.classList.add('badge-aman'); icon.classList.add('icon-aman');
                    icon.querySelector('i').className = 'fas fa-shield-halved';
                    displayText = '✅ SISTEM AMAN';
                }
                badge.innerHTML = `<span>${displayText}</span>`;
                // Skor risiko
                let score = state.status === 'BAHAYA' ? 100 : ['WASPADA','GAS_TERDETEKSI','API_TERDETEKSI'].includes(state.status) ? 70 : state.status === 'RUANGAN_PANAS' ? 40 : state.status === 'RUANGAN_KERING' ? 20 : 5;
                const circle = $('#scoreCircle');
                circle.textContent = score + '%';
                circle.classList.remove('score-low','score-mid','score-high');
                if (score >= 70) circle.classList.add('score-high');
                else if (score >= 30) circle.classList.add('score-mid');
                else circle.classList.add('score-low');
                $('#scoreDesc').textContent = state.status === 'AMAN' ? 'Semua sensor dalam batas normal' : 'Ada indikasi risiko kebakaran';
                let triggers = (state.gasValue >= state.thresholds.gas ? 1 : 0) + (state.objectTemp >= state.thresholds.fireWarn ? 1 : 0) + (state.roomTemp > state.thresholds.roomHot ? 1 : 0) + (state.humidity < state.thresholds.humDry ? 1 : 0);
                $('#triggerText').textContent = triggers + '/4 sensor terpicu';
                updateSparklines();
            }

            // ============= LOGGING =============
            function addLog(eventType, detail) {
                const now = new Date();
                const time = now.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
                state.logs.unshift({
                    time, eventType, detail,
                    status: state.status,
                    gas: state.gasValue,
                    objTemp: state.objectTemp.toFixed(1),
                    roomTemp: state.roomTemp.toFixed(1),
                    hum: state.humidity.toFixed(1),
                });
                if (state.logs.length > 100) state.logs.pop();
                renderLogs(currentLogFilter);
            }
            let currentLogFilter = 'all';
            function renderLogs(filter) {
                currentLogFilter = filter;
                const tbody = $('#logBody');
                let data = state.logs;
                if (filter === 'status') data = data.filter(l => l.eventType === 'status_change');
                if (filter === 'sensor') data = data.filter(l => l.eventType === 'sensor_update' || l.eventType === 'threshold_change');
                if (!data.length) { tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:30px;">🔍 Belum ada log.</td></tr>`; return; }
                tbody.innerHTML = data.map(l => {
                    let badgeClass = l.status === 'BAHAYA' ? 'badge-danger' : ['WASPADA','GAS_TERDETEKSI','API_TERDETEKSI','RUANGAN_PANAS','RUANGAN_KERING'].includes(l.status) ? 'badge-warning' : 'badge-aman';
                    return `<tr><td>${l.time}</td><td><small>${l.detail}</small></td><td><span class="status-badge ${badgeClass}" style="padding:2px 10px;font-size:0.65rem;">${l.status}</span></td><td>${l.gas}</td><td>${l.objTemp}</td><td>${l.roomTemp}</td><td>${l.hum}</td></tr>`;
                }).join('');
            }

            // ============= MQTT CLIENT =============
            const broker = 'ws://broker.emqx.io:8083/mqtt';
            const topic = 'fire_detector/data';
            let mqttClient = null;

            function connectMQTT() {
                mqttClient = mqtt.connect(broker);
                mqttClient.on('connect', () => {
                    state.mqttConnected = true;
                    $('#connDot').classList.add('connected');
                    $('#connLabel').innerHTML = 'MQTT: Terhubung';
                    $('#mqttIcon').innerHTML = '🟢';
                    $('#mqttLabel').innerText = 'Subscribe OK';
                    mqttClient.subscribe(topic, (err) => { if (!err) showToast('✅ Terhubung ke broker MQTT & subscribe'); });
                });
                mqttClient.on('message', (top, msg) => {
                    try {
                        const data = JSON.parse(msg.toString());
                        // Update state dari data MQTT
                        if (data.gas !== undefined) state.gasValue = Number(data.gas);
                        if (data.objectTemp !== undefined) state.objectTemp = Number(data.objectTemp);
                        if (data.roomTemp !== undefined) state.roomTemp = Number(data.roomTemp);
                        if (data.humidity !== undefined) state.humidity = Number(data.humidity);
                        let newStatus = data.status ? data.status.toUpperCase() : analyzeStatusFromArduino();
                        // Pastikan status sesuai dengan 7 mode: BAHAYA, WASPADA, GAS_TERDETEKSI, API_TERDETEKSI, RUANGAN_PANAS, RUANGAN_KERING, AMAN
                        const validStatuses = ['BAHAYA','WASPADA','GAS_TERDETEKSI','API_TERDETEKSI','RUANGAN_PANAS','RUANGAN_KERING','AMAN'];
                        if (!validStatuses.includes(newStatus)) newStatus = 'AMAN';
                        const oldStatus = state.status;
                        state.status = newStatus;
                        applyOutputsByStatus(state.status);
                        pushHistory();
                        updateUI();
                        if (oldStatus !== state.status) addLog('status_change', `Status berubah: ${oldStatus} → ${state.status}`);
                        else addLog('sensor_update', 'Update data dari MQTT');
                    } catch(e) { console.warn('Parse error', e); }
                });
                mqttClient.on('error', (err) => {
                    state.mqttConnected = false;
                    $('#connDot').classList.remove('connected');
                    $('#connLabel').innerHTML = 'MQTT: Error';
                    $('#mqttIcon').innerHTML = '🔴';
                    $('#mqttLabel').innerText = 'Koneksi gagal';
                    showToast('❌ Koneksi MQTT error');
                });
                mqttClient.on('reconnect', () => {
                    $('#connLabel').innerHTML = 'MQTT: Reconnect...';
                    $('#mqttIcon').innerHTML = '🟠';
                });
            }
            connectMQTT();

            // ============= SIMULASI (untuk demo tanpa hardware) =============
            function setSimulation(mode) {
                const th = state.thresholds;
                switch(mode) {
                    case 'normal': state.gasValue=300; state.objectTemp=32; state.roomTemp=27; state.humidity=58; state.status='AMAN'; break;
                    case 'warning': state.gasValue=th.gas+100; state.objectTemp=th.fireWarn+2; state.roomTemp=34; state.humidity=55; state.status='WASPADA'; break;
                    case 'smoke': state.gasValue=th.gas+200; state.objectTemp=45; state.roomTemp=31; state.humidity=48; state.status='GAS_TERDETEKSI'; break;
                    case 'fireOnly': state.gasValue=th.gas-300; state.objectTemp=th.fireWarn+5; state.roomTemp=33; state.humidity=52; state.status='API_TERDETEKSI'; break;
                    case 'hotRoom': state.gasValue=400; state.objectTemp=38; state.roomTemp=th.roomHot+3; state.humidity=60; state.status='RUANGAN_PANAS'; break;
                    case 'dryRoom': state.gasValue=350; state.objectTemp=34; state.roomTemp=29; state.humidity=th.humDry-8; state.status='RUANGAN_KERING'; break;
                    case 'emergency': state.gasValue=th.gas+400; state.objectTemp=th.fireDanger+5; state.roomTemp=38; state.humidity=28; state.status='BAHAYA'; break;
                }
                applyOutputsByStatus(state.status);
                pushHistory();
                updateUI();
                addLog('status_change', `Simulasi: ${mode.toUpperCase()} → ${state.status}`);
                showToast(`Simulasi: ${mode.toUpperCase()}`);
            }

            // ============= TOAST & UTILITY =============
            function showToast(msg) { const toast = $('#toast'); toast.textContent = msg; toast.classList.add('show'); clearTimeout(toast._t); toast._t = setTimeout(() => toast.classList.remove('show'), 2500); }
            window.closeThresholdModal = () => $('#thresholdModal').classList.remove('active');

            // ============= EVENT LISTENERS =============
            document.querySelectorAll('[data-sim]').forEach(btn => btn.addEventListener('click', (e) => setSimulation(e.target.closest('[data-sim]').dataset.sim)));
            $('#btnThreshold').addEventListener('click', () => {
                $('#thGas').value = state.thresholds.gas;
                $('#thFireDanger').value = state.thresholds.fireDanger;
                $('#thFireWarn').value = state.thresholds.fireWarn;
                $('#thRoomHot').value = state.thresholds.roomHot;
                $('#thHumDry').value = state.thresholds.humDry;
                $('#thresholdModal').classList.add('active');
            });
            $('#saveThreshold').addEventListener('click', () => {
                state.thresholds.gas = parseInt($('#thGas').value) || 2000;
                state.thresholds.fireDanger = parseFloat($('#thFireDanger').value) || 70;
                state.thresholds.fireWarn = parseFloat($('#thFireWarn').value) || 50;
                state.thresholds.roomHot = parseFloat($('#thRoomHot').value) || 40;
                state.thresholds.humDry = parseFloat($('#thHumDry').value) || 50;
                closeThresholdModal();
                addLog('threshold_change', 'Threshold sensor diperbarui');
                showToast('✅ Threshold disimpan');
                if (!state.mqttConnected) {
                    const newStatus = analyzeStatusFromArduino();
                    if (state.status !== newStatus) { state.status = newStatus; applyOutputsByStatus(state.status); updateUI(); addLog('status_change', `Threshold berubah, status -> ${state.status}`); }
                }
            });
            $('#btnClearLog').addEventListener('click', () => { state.logs = []; renderLogs('all'); showToast('Log dihapus'); });
            $$('.log-filter').forEach(btn => btn.addEventListener('click', function() { $$('.log-filter').forEach(b => b.classList.remove('active-btn')); this.classList.add('active-btn'); renderLogs(this.dataset.filter); }));
            $('#darkToggle').addEventListener('click', () => { document.body.classList.toggle('dark'); localStorage.setItem('fireAlarmDark', document.body.classList.contains('dark')); });
            if (localStorage.getItem('fireAlarmDark') === 'true') document.body.classList.add('dark');

            // Initialisasi
            buildSensorCards();
            buildOutputCards();
            initSparklines();
            setSimulation('normal');
            updateUI();
            console.log('🔥 Dashboard MQTT siap. ESP32 mengirim ke topic:', topic);
        })();
    </script>
</body>
</html>
