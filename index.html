```html
<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>FireGuard IoT</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

body{
    font-family: Arial;
    background:#111827;
    color:white;
    margin:0;
    padding:20px;
}

.card{
    background:#1f2937;
    padding:20px;
    border-radius:16px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.value{
    font-size:40px;
    font-weight:bold;
}

.green{color:#10b981;}
.yellow{color:#f59e0b;}
.red{color:#ef4444;}

.status{
    font-size:30px;
    font-weight:bold;
}

canvas{
    background:white;
    border-radius:10px;
    padding:10px;
}

</style>

</head>

<body>

<h1>🔥 FireGuard IoT Dashboard</h1>

<div class="card">

<h2 id="status"
class="status green">

AMAN

</h2>

<p id="mqttStatus">
MQTT Connecting...
</p>

</div>

<div class="grid">

<div class="card">
<h3>MQ2</h3>
<div id="gas"
class="value">0</div>
</div>

<div class="card">
<h3>Api</h3>
<div id="api"
class="value">0</div>
</div>

<div class="card">
<h3>Room</h3>
<div id="room"
class="value">0</div>
</div>

<div class="card">
<h3>Humidity</h3>
<div id="hum"
class="value">0</div>
</div>

</div>

<div class="card">

<canvas id="chart"></canvas>

</div>

<script>

const BROKER =
'wss://broker.emqx.io:8084/mqtt';

const TOPIC =
'fire_detector/data';

const mqttStatus =
document.getElementById(
'mqttStatus'
);

const statusText =
document.getElementById(
'status'
);

const gasText =
document.getElementById(
'gas'
);

const apiText =
document.getElementById(
'api'
);

const roomText =
document.getElementById(
'room'
);

const humText =
document.getElementById(
'hum'
);

// CHART

const ctx =
document.getElementById(
'chart'
);

const chart =
new Chart(ctx, {

type:'line',

data:{
labels:[],
datasets:[
{
label:'MQ2',
data:[]
},
{
label:'API',
data:[]
},
{
label:'ROOM',
data:[]
},
{
label:'HUM',
data:[]
}
]
},

options:{
responsive:true
}

});

// MQTT

const client = mqtt.connect(
BROKER
);

client.on(
'connect',
()=>{

console.log(
'MQTT CONNECTED'
);

mqttStatus.innerHTML =
'✅ MQTT Connected';

client.subscribe(
TOPIC
);

}
);

client.on(
'message',
(topic,message)=>{

const data =
JSON.parse(
message.toString()
);

console.log(data);

gasText.innerHTML =
data.gas;

apiText.innerHTML =
data.objectTemp;

roomText.innerHTML =
data.roomTemp;

humText.innerHTML =
data.humidity;

statusText.innerHTML =
data.status;

statusText.className =
'status';

if(data.status === 'AMAN'){

statusText.classList.add(
'green'
);

}
else if(
data.status === 'WASPADA'
){

statusText.classList.add(
'yellow'
);

}
else{

statusText.classList.add(
'red'
);

}

// CHART

const time =
new Date()
.toLocaleTimeString();

chart.data.labels.push(
time
);

chart.data.datasets[0]
.data.push(data.gas);

chart.data.datasets[1]
.data.push(data.objectTemp);

chart.data.datasets[2]
.data.push(data.roomTemp);

chart.data.datasets[3]
.data.push(data.humidity);

if(
chart.data.labels.length > 15
){

chart.data.labels.shift();

chart.data.datasets.forEach(
d=>d.data.shift()
);

}

chart.update();

}
);

client.on(
'error',
(err)=>{

console.log(err);

mqttStatus.innerHTML =
'❌ MQTT Error';

}
);

client.on(
'close',
()=>{

mqttStatus.innerHTML =
'⚠️ MQTT Disconnect';

}
);

</script>

</body>
</html>
```
